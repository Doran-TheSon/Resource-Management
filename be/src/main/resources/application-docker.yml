# Docker profile — ghi đè một số setting cho môi trường container
server:
  port: 8080

spring:
  datasource:
    # Có thể đổi sang MySQL qua biến môi trường
    url: jdbc:h2:mem:resource_management
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

logging:
  level:
    com.resourcemanagement: INFO
    org.springframework: WARN
