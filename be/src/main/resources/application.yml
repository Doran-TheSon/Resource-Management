server:
  port: 8080

spring:
  application:
    name: resource-management

  # H2 Database (development)
  datasource:
    url: jdbc:h2:mem:resource_management
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

logging:
  level:
    com.resourcemanagement: DEBUG
    org.springframework: INFO
