services:
  db:
    image: postgres:16-alpine
    container_name: rm-db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=resource_management
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - rm-network
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: rm-pgadmin
    ports:
      - "5050:80"
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@rm.com
      - PGADMIN_DEFAULT_PASSWORD=admin
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    depends_on:
      db:
        condition: service_healthy
    networks:
      - rm-network
    restart: unless-stopped

  be:
    build:
      context: ./be
      dockerfile: Dockerfile
    container_name: rm-be
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    env_file:
      - ./be/.env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - rm-network
    restart: unless-stopped

  fe:
    build:
      context: ./fe
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://be:8080
    container_name: rm-fe
    ports:
      - "5173:3000"
    depends_on:
      - be
    networks:
      - rm-network
    restart: unless-stopped

networks:
  rm-network:
    driver: bridge

volumes:
  pgdata:
  pgadmin-data:
